<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trình tạo ảnh AI miễn phí</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            color: #333;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #0056b3;
            margin-bottom: 25px;
            font-size: 2em;
        }
        textarea {
            width: calc(100% - 20px);
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1em;
            resize: vertical;
            min-height: 80px;
            box-sizing: border-box;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #0056b3;
        }
        .image-container {
            margin-top: 30px;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 15px;
            background-color: #fafafa;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .image-container img {
            max-width: 100%;
            max-height: 500px;
            border-radius: 6px;
            display: none; /* Ẩn ban đầu */
        }
        .image-container .placeholder {
            color: #888;
            font-style: italic;
        }
        .loading {
            display: none;
            margin-top: 20px;
            font-size: 1.1em;
            color: #007bff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tạo ảnh AI miễn phí</h1>
        <p>Nhập mô tả chi tiết về hình ảnh bạn muốn tạo:</p>
        <textarea id="promptInput" placeholder="Ví dụ: một con mèo đang bay trong không gian, phong cách hoạt hình, màu sắc tươi sáng"></textarea>
        <button id="generateBtn">Tạo ảnh</button>
        <div class="loading" id="loadingMessage">Đang tạo ảnh, vui lòng chờ...</div>
        <div class="image-container">
            <img id="generatedImage" src="" alt="Ảnh được tạo bởi AI">
            <p class="placeholder" id="imagePlaceholder">Ảnh của bạn sẽ xuất hiện ở đây</p>
        </div>
    </div>

    <script>
        const promptInput = document.getElementById('promptInput');
        const generateBtn = document.getElementById('generateBtn');
        const generatedImage = document.getElementById('generatedImage');
        const imagePlaceholder = document.getElementById('imagePlaceholder');
        const loadingMessage = document.getElementById('loadingMessage');

        generateBtn.addEventListener('click', () => {
            const prompt = promptInput.value.trim();
            if (prompt) {
                imagePlaceholder.style.display = 'none';
                generatedImage.style.display = 'none';
                loadingMessage.style.display = 'block';
                generatedImage.src = ''; // Clear previous image

                // Encode the prompt for URL
                const encodedPrompt = encodeURIComponent(prompt);
                // Pollinations.ai API for image generation
                const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}`;

                // We don't need to fetch, just set the src directly
                // The browser will handle loading the image from Pollinations.ai
                generatedImage.onload = () => {
                    loadingMessage.style.display = 'none';
                    generatedImage.style.display = 'block';
                };
                generatedImage.onerror = () => {
                    loadingMessage.style.display = 'none';
                    imagePlaceholder.textContent = 'Không thể tạo ảnh. Vui lòng thử lại với mô tả khác.';
                    imagePlaceholder.style.display = 'block';
                };
                generatedImage.src = imageUrl;

            } else {
                alert('Vui lòng nhập mô tả để tạo ảnh.');
            }
        });
    </script>
</body>
</html>
