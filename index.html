<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Pro - Tạo ảnh miễn phí</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --secondary-color: #6366f1;
            --bg-color: #f9fafb;
            --card-bg: #ffffff;
            --text-color: #1f2937;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 20px;
            font-size: 1.8rem;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        textarea {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            min-height: 100px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        select {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1.5px solid #e5e7eb;
            background: white;
        }
        .upload-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f3f4f6;
            border-radius: 12px;
            border: 2px dashed #d1d5db;
            cursor: pointer;
            position: relative;
        }
        .upload-section input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .upload-icon {
            font-size: 24px;
            color: var(--primary-color);
        }
        .preview-thumb {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 6px;
            display: none;
        }
        .btn-generate {
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }
        .btn-generate:active {
            transform: scale(0.98);
        }
        .btn-generate:disabled {
            background: #9ca3af;
        }
        .result-section {
            margin-top: 30px;
            text-align: center;
        }
        .image-wrapper {
            width: 100%;
            min-height: 300px;
            background: #f3f4f6;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        #resultImg {
            max-width: 100%;
            display: none;
        }
        .loading-spinner {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f4f6;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .action-buttons {
            display: none;
            margin-top: 15px;
            gap: 10px;
            justify-content: center;
        }
        .btn-download {
            padding: 10px 20px;
            background: #10b981;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <h1>✨ AI Image Pro</h1>
        
        <div class="input-group">
            <label>Mô tả hình ảnh (Tiếng Anh tốt hơn):</label>
            <textarea id="prompt" placeholder="Ví dụ: A futuristic city with flying cars, cinematic lighting, 8k..."></textarea>
        </div>

        <div class="options-grid">
            <div>
                <label>Kích thước:</label>
                <select id="aspectRatio">
                    <option value="1:1">Vuông (1:1)</option>
                    <option value="16:9">Ngang (16:9)</option>
                    <option value="9:16">Dọc (9:16)</option>
                </select>
            </div>
            <div>
                <label>Phong cách:</label>
                <select id="style">
                    <option value="">Mặc định</option>
                    <option value="photorealistic">Ảnh thật</option>
                    <option value="anime">Anime</option>
                    <option value="digital-art">Nghệ thuật số</option>
                    <option value="cyberpunk">Cyberpunk</option>
                </select>
            </div>
        </div>

        <div class="upload-section" id="uploadBox">
            <span class="upload-icon">➕</span>
            <span id="uploadText">Tải ảnh mẫu lên (Tùy chọn)</span>
            <img id="previewThumb" class="preview-thumb">
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <button class="btn-generate" id="genBtn">TẠO ẢNH NGAY</button>

        <div class="result-section">
            <div class="image-wrapper">
                <div class="loading-spinner" id="spinner"></div>
                <img id="resultImg" alt="AI Generated Image">
                <p id="placeholderText">Ảnh của bạn sẽ xuất hiện tại đây</p>
            </div>
            <div class="action-buttons" id="actionBtns">
                <a href="#" class="btn-download" id="downloadBtn" download="ai-image.jpg">Lưu hình ảnh</a>
            </div>
        </div>
    </div>

    <script>
        const genBtn = document.getElementById('genBtn');
        const promptInput = document.getElementById('prompt');
        const resultImg = document.getElementById('resultImg');
        const spinner = document.getElementById('spinner');
        const placeholderText = document.getElementById('placeholderText');
        const actionBtns = document.getElementById('actionBtns');
        const downloadBtn = document.getElementById('downloadBtn');
        const fileInput = document.getElementById('fileInput');
        const previewThumb = document.getElementById('previewThumb');
        const uploadText = document.getElementById('uploadText');

        // Xem trước ảnh tải lên
        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewThumb.src = e.target.result;
                    previewThumb.style.display = 'block';
                    uploadText.innerText = "Đã chọn ảnh mẫu";
                }
                reader.readAsDataURL(file);
            }
        });

        genBtn.addEventListener('click', async () => {
            const prompt = promptInput.value.trim();
            if (!prompt) {
                alert("Vui lòng nhập mô tả!");
                return;
            }

            // Hiển thị trạng thái đang tải
            genBtn.disabled = true;
            spinner.style.display = 'block';
            resultImg.style.display = 'none';
            placeholderText.style.display = 'none';
            actionBtns.style.display = 'none';

            const ratio = document.getElementById('aspectRatio').value;
            const style = document.getElementById('style').value;
            
            // Xử lý kích thước
            let width = 1024, height = 1024;
            if(ratio === "16:9") { width = 1280; height = 720; }
            if(ratio === "9:16") { width = 720; height = 1280; }

            // Tạo URL API
            const finalPrompt = `${prompt} ${style ? ', style ' + style : ''}`;
            const seed = Math.floor(Math.random() * 1000000);
            const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(finalPrompt)}?width=${width}&height=${height}&seed=${seed}&nologo=true`;

            // Tải ảnh
            resultImg.src = imageUrl;
            resultImg.onload = () => {
                spinner.style.display = 'none';
                resultImg.style.display = 'block';
                genBtn.disabled = false;
                actionBtns.style.display = 'flex';
                
                // Cập nhật nút tải về
                fetch(imageUrl).then(res => res.blob()).then(blob => {
                    const url = window.URL.createObjectURL(blob);
                    downloadBtn.href = url;
                });
            };

            resultImg.onerror = () => {
                alert("Có lỗi xảy ra, vui lòng thử lại!");
                genBtn.disabled = false;
                spinner.style.display = 'none';
                placeholderText.style.display = 'block';
            };
        });
    </script>
</body>
</html>
